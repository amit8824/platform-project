name: platform-ci

on:
  push:
    branches:
      - main


env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: platform-api


jobs:

  build:

    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4


    - name: Configure AWS Credentials

      uses: aws-actions/configure-aws-credentials@v4

      with:

        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

        aws-region: ${{ env.AWS_REGION }}


    - name: Login to Amazon ECR

      id: login-ecr

      uses: aws-actions/amazon-ecr-login@v2


    - name: Build and Push Image

      env:

        REGISTRY: ${{ steps.login-ecr.outputs.registry }}

        IMAGE_TAG: ${{ github.sha }}

      run: |

        docker build \
        -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .


        docker push \
        $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


    - name: Update Helm Image Tag

      run: |

        sed -i \
        "s/tag:.*/tag: ${{ github.sha }}/" \
        helm/platform-chart/values.yaml


    - name: Commit Helm Update

      run: |

        git config user.name github-actions

        git config user.email github-actions@github.com

        git add helm/platform-chart/values.yaml

        git commit -m "update image version"

        git push