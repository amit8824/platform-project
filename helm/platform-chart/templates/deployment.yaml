apiVersion: apps/v1
kind: Deployment

metadata:
  name: platform-api

spec:   
  
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: platform-api

  template:
    
    metadata:
      labels:
        app: platform-api

    spec:
      containers:

      - name: platform-api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: platform-secret
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        readinessProbe:

          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 15
          periodSeconds: 20

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

            
